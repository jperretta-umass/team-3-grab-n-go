services:
  backend:
    build :
      context : ./backend
    env_file: .env.test
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      test_db:
        condition: service_healthy
    ports:
      - "8000:8000"

  test_db:
    image: postgres:16-alpine
    env_file: .env.test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 30