services:
  nginx:
    image: nginx:1.27-alpine
    ports: ["80:80"]
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  backend:
    build: ./backend
    env_file: .env
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports: 
      - "8000:8000" ##IMPORTANT THIS IS ONLY DURING DEVLOPMENT TO TEST ON LOCAL MACHINE, DELETE LINE LATER
    depends_on:
    
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports: 
      - "5173:5173" ##IMPORTANT THIS IS ONLY DURING DEVLOPMENT TO TEST ON LOCAL MACHINE, DELETE LINE LATER
    
  db:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  pgdata:
  