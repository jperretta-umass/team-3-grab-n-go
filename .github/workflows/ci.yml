name: ci
on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install (pip-tools pinned deps)
        run: |
          python -m pip install -U pip
          pip install pip-tools
          pip-sync requirements.txt requirements-dev.txt
      - name: Lint + typecheck
        run: |
          isort --check-only --profile black .
          black --check .
          pycodestyle backend/app backend/tests --max-line-length=88
          pycodestyle end2endTest --max-line-length=88
          pyright
      - name: Tests
        run: python3 -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: ESLint
        run: npm run lint

  end2endTest:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Start stack (test DB)
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml up -d --build
          for i in {1..60}; do
            if curl -fsS http://localhost/api/health >/dev/null; then
              echo "healthy"; break
            fi
            sleep 2
          done

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          #cache: "npm"
          #cache-dependency-path: end2endTest/package-lock.json

     # - name: Install Playwright
     #   working-directory: end2endTest
     #   run: |
     #     npm ci
     #     npx playwright install --with-deps

     # - name: Run Playwright
     #   working-directory: end2endTest
     #   env:
     #     BASE_URL: http://localhost
     #   run: npx playwright test

      - name: Logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Shutdown
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v