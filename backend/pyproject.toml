[tool.black]
line-length = 88

[tool.isort]
profile = "black"
line_length = 88

[tool.pycodestyle]
max-line-length = 88
ignore = ["E203", "W503"]  # common black compatibility
exclude = ".venv,build,dist,.git,__pycache__"

[tool.pyright]
typeCheckingMode = "basic"
include = ["app", "tests"]

[tool.pytest.ini_options]
pythonpath = "."