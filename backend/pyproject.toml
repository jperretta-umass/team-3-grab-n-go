[tool.black]
line-length = 88

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["app"]
src_paths = ["backend"]

[tool.pycodestyle]
max-line-length = 88
ignore = ["E203", "W503"]  # common black compatibility
exclude = ".venv,build,dist,.git,__pycache__"

[tool.pyright]
typeCheckingMode = "strict"
include = ["app", "tests"]